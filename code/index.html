<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barcode Studio — Generate & Decode</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- QR + Decode libs -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<!-- SCROLL PROGRESS BAR -->
<div class="nav-progress" id="progress"></div>

<!-- FLOATING NAV -->
<nav id="nav">
  <div class="nav-inner">
    <div class="nav-logo">BARCODE STUDIO</div>
    <div class="nav-right">
      <div class="nav-dot"></div>
      <div class="nav-badge">Generate &amp; Decode</div>
    </div>
  </div>
</nav>

<div class="hero">
  <h1>Every format.<br><span>One clean tool.</span></h1>
  <p>Generate 2D &amp; matrix barcodes &nbsp;·&nbsp; Decode any image instantly</p>
</div>

<div class="main-grid">

  <!-- ══ GENERATE ══ -->
  <div class="panel">
    <div class="panel-header">
      <div class="pico">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
      </div>
      <div><div class="ptitle">Generate</div><div class="psub">Pick format · enter content · export</div></div>
    </div>
    <div class="pbody">

      <label class="fl">Format</label>
      <div class="fmt-grid">
        <button class="fb on" data-fmt="qrcode"     onclick="selFmt(this)"><span class="fi">⬛</span>QR Code</button>
        <button class="fb" data-fmt="datamatrix"    onclick="selFmt(this)"><span class="fi">▦</span>Data Matrix</button>
        <button class="fb" data-fmt="azteccode"     onclick="selFmt(this)"><span class="fi">◎</span>Aztec Code</button>
        <button class="fb" data-fmt="pdf417"        onclick="selFmt(this)"><span class="fi">▬</span>PDF417</button>
        <button class="fb" data-fmt="code128"       onclick="selFmt(this)"><span class="fi">|||</span>Code 128</button>
        <button class="fb" data-fmt="code39"        onclick="selFmt(this)"><span class="fi">|.|</span>Code 39</button>
        <button class="fb" data-fmt="ean13"         onclick="selFmt(this)"><span class="fi">▐▌</span>EAN-13</button>
        <button class="fb" data-fmt="upca"          onclick="selFmt(this)"><span class="fi">▐║</span>UPC-A</button>
        <button class="fb" data-fmt="maxicode"      onclick="selFmt(this)"><span class="fi">⬡</span>MaxiCode</button>
      </div>

      <!-- format hint -->
      <div id="fmt-hint" style="font-size:10.5px;color:var(--ink-f);margin-bottom:14px;line-height:1.5;min-height:16px;"></div>

      <label class="fl mb12">Content</label>
      <textarea id="gi" class="mb16" placeholder="Enter URL, text, or numeric data…"></textarea>

      <div class="row2">
        <div>
          <label class="fl">Size</label>
          <select id="gs">
            <option value="180">Small — 180px</option>
            <option value="260" selected>Medium — 260px</option>
            <option value="380">Large — 380px</option>
          </select>
        </div>
        <div>
          <label class="fl">Dot color</label>
          <input type="color" id="gc" value="#000000">
        </div>
      </div>

      <!-- QR-only customization -->
      <div id="qr-custom" class="qr-style-section">
        <label class="fl" style="margin-bottom:8px">QR Dot Style</label>
        <div class="style-row">
          <button class="style-chip on" data-style="square" onclick="selStyle(this)">
            <svg viewBox="0 0 14 14" fill="currentColor"><rect x="2" y="2" width="10" height="10" rx="0"/></svg>Square
          </button>
          <button class="style-chip" data-style="rounded" onclick="selStyle(this)">
            <svg viewBox="0 0 14 14" fill="currentColor"><rect x="2" y="2" width="10" height="10" rx="3"/></svg>Rounded
          </button>
          <button class="style-chip" data-style="dots" onclick="selStyle(this)">
            <svg viewBox="0 0 14 14" fill="currentColor"><circle cx="4" cy="4" r="2"/><circle cx="10" cy="4" r="2"/><circle cx="4" cy="10" r="2"/><circle cx="10" cy="10" r="2"/><circle cx="7" cy="7" r="2"/></svg>Dots
          </button>
          <button class="style-chip" data-style="classy" onclick="selStyle(this)">
            <svg viewBox="0 0 14 14" fill="currentColor"><rect x="2" y="2" width="10" height="10" rx="5"/></svg>Circle
          </button>
        </div>
        <label class="fl" style="margin-bottom:6px">Center Icon <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--ink-f);font-size:9px">(QR only · optional)</span></label>
        <div class="icon-upload-row">
          <div class="icon-upload-btn">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            Upload icon
            <input type="file" accept="image/*" id="icon-file" onchange="handleIcon(event)">
          </div>
          <img id="icon-prev" class="icon-preview" src="" alt="icon">
          <button class="icon-clear" id="icon-clear" onclick="clearIcon()">×</button>
        </div>
      </div>

      <button class="btn-pri" id="gen-btn" onclick="generate()">Generate Barcode</button>

      <div class="qr-res" id="qr-res">
        <div class="qr-wrap"><div id="qr-out"></div></div>

        <!-- SHARE -->
        <p class="share-label">Share via</p>
        <div class="social-grid">

          <button class="soc-btn soc-wa" onclick="shareWA()">
            <div class="sic">
              <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
            </div>
            <div class="slabel">WhatsApp<span>Share content text</span></div>
          </button>

          <button class="soc-btn soc-tg" onclick="shareTG()">
            <div class="sic">
              <svg viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
            </div>
            <div class="slabel">Telegram<span>Share content text</span></div>
          </button>

          <button class="soc-btn soc-tw" onclick="shareTW()">
            <div class="sic">
              <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.259 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </div>
            <div class="slabel">X (Twitter)<span>Share content text</span></div>
          </button>

          <button class="soc-btn soc-em" onclick="shareEmail()">
            <div class="sic">
              <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
              </svg>
            </div>
            <div class="slabel">Email<span>Send via mail client</span></div>
          </button>

          <button class="soc-btn soc-li" onclick="shareLI()">
            <div class="sic">
              <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            </div>
            <div class="slabel">LinkedIn<span>Share content text</span></div>
          </button>

          <button class="soc-btn soc-rd" onclick="shareRD()">
            <div class="sic">
              <svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.687-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>
            </div>
            <div class="slabel">Reddit<span>Share content text</span></div>
          </button>

        </div>

        <!-- copy / share / download -->
        <div class="icon-row">
          <button class="ic-btn" onclick="copyImg()" title="Copy image">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Copy
          </button>
          <button class="ic-btn" onclick="shareNative()" title="Share">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>
            Share
          </button>
          <button class="ic-btn" onclick="dlPNG()" title="Download PNG">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download
          </button>
        </div>

      </div><!-- /qr-res -->
    </div>
  </div><!-- /generate panel -->

  <!-- ══ DECODE ══ -->
  <div class="panel">
    <div class="panel-header">
      <div class="pico g">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </div>
      <div><div class="ptitle">Decode</div><div class="psub">Upload any QR or barcode image</div></div>
    </div>
    <div class="pbody">

      <div class="dz" id="dz" ondragover="oDO(event)" ondragleave="oDL()" ondrop="oDD(event)">
        <input type="file" accept="image/*" onchange="hFile(event)">
        <div class="di">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <div class="dt">Drop image here</div>
        <div class="ds">or click to browse · PNG, JPG, WebP, GIF</div>
      </div>

      <div class="dec-res" id="dec-res">
        <img id="dprev" class="prev" src="" alt="Uploaded barcode">
        <div id="dcontent"></div>
      </div>

    </div>
  </div>

</div><!-- /main-grid -->

<div class="toast" id="toast"><span class="toast-icon" id="toast-icon"></span><span id="toast-msg"></span></div>
<script src="assets/script/script.js"></script>
</body>
</html>
