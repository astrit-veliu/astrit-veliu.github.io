<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barcode Studio — Generate & Decode</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bwip-js@4.2.2/dist/bwip-js-min.js"></script>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav>
  <div class="nav-logo">BARCODE STUDIO</div>
  <div class="nav-badge">Generate &amp; Decode</div>
</nav>

<div class="hero">
  <h1>Every format.<br><span>One clean tool.</span></h1>
  <p>Generate 2D &amp; matrix barcodes · Decode any image instantly</p>
</div>

<div class="main-grid">

  <!-- GENERATE -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
      </div>
      <div><div class="panel-title">Generate</div><div class="panel-sub">Pick format · enter content · export</div></div>
    </div>
    <div class="panel-body">

      <label class="fl">Format</label>
      <div class="fmt-grid">
        <button class="fb on" data-fmt="qrcode" onclick="selFmt(this)"><span class="fi">⬛</span>QR Code</button>
        <button class="fb" data-fmt="datamatrix" onclick="selFmt(this)"><span class="fi">▦</span>Data Matrix</button>
        <button class="fb" data-fmt="azteccode" onclick="selFmt(this)"><span class="fi">◎</span>Aztec Code</button>
        <button class="fb" data-fmt="pdf417" onclick="selFmt(this)"><span class="fi">▬</span>PDF417</button>
        <button class="fb" data-fmt="code128" onclick="selFmt(this)"><span class="fi">|||</span>Code 128</button>
        <button class="fb" data-fmt="code39" onclick="selFmt(this)"><span class="fi">|.||</span>Code 39</button>
        <button class="fb" data-fmt="ean13" onclick="selFmt(this)"><span class="fi">▐▌</span>EAN-13</button>
        <button class="fb" data-fmt="upca" onclick="selFmt(this)"><span class="fi">▐║</span>UPC-A</button>
        <button class="fb" data-fmt="maxicode" onclick="selFmt(this)"><span class="fi">⬡</span>MaxiCode</button>
      </div>

      <label class="fl mb12">Content</label>
      <textarea id="gi" class="mb16" placeholder="Enter URL, text, or numeric data…"></textarea>

      <div class="row2">
        <div><label class="fl">Size</label>
          <select id="gs">
            <option value="180">Small 180px</option>
            <option value="260" selected>Medium 260px</option>
            <option value="380">Large 380px</option>
          </select>
        </div>
        <div><label class="fl">Dot color</label>
          <input type="color" id="gc" value="#000000">
        </div>
      </div>

      <button class="btn-pri" onclick="generate()">⌘ Generate Barcode</button>

      <div class="qr-res" id="qr-res">
        <div class="qr-wrap"><div id="qr-out"></div></div>
        <div class="share-row">
          <button class="sc" onclick="shareNative()">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>Share
          </button>
          <button class="sc" onclick="copyImg()">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>Copy
          </button>
          <button class="sc" onclick="shareWA()">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
            WhatsApp
          </button>
          <button class="sc" onclick="shareEmail()">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
            </svg>Email
          </button>
        </div>
        <button class="btn-out" style="width:100%;justify-content:center" onclick="dlPNG()">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>Download PNG
        </button>
      </div>
    </div>
  </div>

  <!-- DECODE -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-icon g">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </div>
      <div><div class="panel-title">Decode</div><div class="panel-sub">Upload any QR or barcode image</div></div>
    </div>
    <div class="panel-body">

      <div class="dz" id="dz" ondragover="oDO(event)" ondragleave="oDL()" ondrop="oDD(event)">
        <input type="file" accept="image/*" onchange="hFile(event)">
        <div class="di">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <div class="dt">Drop image here</div>
        <div class="ds">or click to browse · PNG, JPG, WebP, GIF</div>
      </div>

      <div class="dec-res" id="dec-res">
        <img id="dprev" class="prev" src="" alt="Uploaded barcode">
        <div id="dcontent"></div>
      </div>

    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="assets/script/script.js"></script>
</body>
</html>
